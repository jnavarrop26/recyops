version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-*"
          - "@types/react*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
